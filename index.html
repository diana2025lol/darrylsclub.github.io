<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Darryl's Club</title>

    <!-- Custom Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1f1f1f;
            color: #ffffff;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            line-height: 1.7;
            opacity: 0;
            animation: bodyFadeIn 0.8s ease-out 1.8s forwards;
        }

        @keyframes bodyFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #111;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.8s ease-out 1s forwards;
        }

        #loading-text {
            font-size: 38px;
            font-family: 'Montserrat', sans-serif;
            opacity: 0;
            animation: popIn 0.8s ease-out forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        h1 {
            text-align: center;
            margin-top: 80px;
            font-size: 45px;
            font-family: 'Montserrat', sans-serif;
        }

        img.main-image {
            width: 100%;
            max-width: 550px;
            display: block;
            margin: 30px auto;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        /* MENU BUTTON */
        .menu-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #2d2d2d;
            border: 2px solid #ffffff;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.25s;
            z-index: 2000;
        }

        .menu-button:hover {
            background-color: #3d3d3d;
            transform: scale(1.05);
        }

        .menu-button div {
            font-size: 28px;
            margin-bottom: 3px;
        }

        /* SIDEBAR */
        #sidebar {
            position: fixed;
            left: -260px;
            top: 0;
            height: 100%;
            width: 260px;
            background-color: #1b1b1b;
            box-shadow: 3px 0 15px rgba(0,0,0,0.4);
            padding-top: 90px;
            transition: 0.3s ease;
            z-index: 1500;
        }

        #sidebar.open {
            left: 0;
        }

        #sidebar button {
            width: 100%;
            padding: 18px;
            background: none;
            border: none;
            color: white;
            text-align: left;
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s;
        }

        #sidebar button:hover {
            background: #333;
            padding-left: 26px;
        }

        /* BACKDROP */
        #backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(3px);
            background: rgba(0,0,0,0.45);
            display: none;
            z-index: 1400;
        }

        #backdrop.active {
            display: block;
        }

        /* CATEGORY CONTENT */
        #category-content {
            background-color: #262626;
            padding: 25px;
            margin-top: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            animation: fadeIn 0.4s ease-out;
        }

        /* CARD STYLE for Q&A + STAFF */
        .card {
            background: #1d1d1d;
            padding: 18px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 4px solid #888;
            box-shadow: 0 0 12px rgba(0,0,0,0.3);
        }

        .card h3 {
            margin: 0 0 10px;
            font-weight: 700;
            font-size: 20px;
        }

        .section-title {
            font-size: 22px;
            margin-top: 25px;
            font-weight: 700;
            border-bottom: 2px solid #444;
            padding-bottom: 6px;
        }

        .action-button {
            display: block;
            width: 240px;
            margin: 30px auto;
            padding: 14px;
            background: #111;
            color: white;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: 0.25s;
        }

        .action-button:hover {
            background-color: #222;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
    <div id="loading-text">Darryl's Club</div>
</div>

<!-- MENU BUTTON -->
<div class="menu-button" onclick="toggleSidebar()">
    <div>≡</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
    <button onclick="showCategory('qna')">Q&A's</button>
    <button onclick="showCategory('staff')">Server Staff</button>
    <button onclick="showCategory('discord')">Discord Server</button>
    <button onclick="showCategory('nulls')">Null's Club</button>
    <button onclick="showCategory('verify')">Server Verification</button>
    <button onclick="showCategory('credits')">Credits</button>
</div>

<div id="backdrop" onclick="toggleSidebar()"></div>

<h1>Darryl's Club</h1>

<p style="text-align:center;">
    Hello, welcome to the official website of Darryl's Club!<br><br>
    Use the sidebar on the left for navigation.
</p>

<img class="main-image" src="https://i.postimg.cc/W4Y1jwtg/301bc99bc52c48890f5618b9b0292341.jpg">

<div id="category-content"></div>

<script>
function toggleSidebar() {
    let bar = document.getElementById("sidebar");
    let bg = document.getElementById("backdrop");

    if (bar.classList.contains("open")) {
        bar.classList.remove("open");
        bg.classList.remove("active");
    } else {
        bar.classList.add("open");
        bg.classList.add("active");
    }
}

function showCategory(cat) {
    let content = "";

    /* -------------------- Q&A CARDS -------------------- */
    if (cat === "qna") {
        content = `
        <div class="section-title">Q&A's</div>

        <div class="card">
            <h3>How to become staff?</h3>
            Be active and engage with the community. Show that you’re trustworthy and responsible.
        </div>

        <div class="card">
            <h3>What happens if I break a rule?</h3>
            Minor rule breaks = warning or timeout.<br>
            Major violations (ex: doxxing) = instant ban.
        </div>

        <div class="card">
            <h3>Can I appeal a ban?</h3>
            Yes — contact Mr.Black (@mr.black78) or any staff member you have friended.
        </div>
        `;
    }

    /* -------------------- STAFF CARDS -------------------- */
    if (cat === "staff") {
        content = `
        <div class="section-title">Server Staff</div>

        <div class="section-title" style="margin-top:10px;">Higher Staff</div>

        <div class="card"><h3>Owner</h3>Mr.Black (@mr.black78)</div>
        <div class="card"><h3>Overseer</h3>Ace (@aceyywithay)</div>

        <div class="section-title">Lower Staff</div>

        <div class="card"><h3>Moderator</h3>Jayden (@aian_jj)</div>
        <div class="card"><h3>Trial Moderator</h3>Xye (@xyeistiredfromthis)</div>
        <div class="card"><h3>Rule Enforcer</h3>Mark (@markymark2810)</div>
        <div class="card"><h3>Integration Liaison</h3>Kal (@chollima216)</div>

        <div class="section-title">Retired Staff</div>

        <div class="card">@ilovetoast78 <i>(Overseer)</i></div>
        <div class="card">@ddiana.lol <i>(Manager)</i></div>
        <div class="card">@dominoo90 <i>(Moderator)</i></div>
        <div class="card">@gabriel_1975 <i>(Senior Moderator)</i></div>
        <div class="card">@aiden_from_sbg16 <i>(Moderator)</i></div>

        <p style="opacity:0.7; margin-top:15px; font-size:16px;">
            This list may be outdated — changes will be reflected soon.
        </p>
        `;
    }

    /* -------------------- DISCORD -------------------- */
    if (cat === "discord") {
        content = `
        <div class="section-title">Discord Server</div>
        <p>If you wish to join our Discord server, press the button below!</p>
        <a class="action-button" href="https://discord.gg/EnJApsrQKA">Join Discord</a>
        `;
    }

    /* -------------------- NULL'S CLUB -------------------- */
    if (cat === "nulls") {
        content = `
        <div class="section-title">Null's Club</div>
        <p>If you wish to join Null's Club, press the button below!</p>
        <a class="action-button" href="https://link.nulls.gg/nb/invite/band/en?tag=QQ0LUQ998&token=p3n4y9uvzcr">Join Null's Club</a>
        `;
    }

    /* -------------------- VERIFICATION -------------------- */
    if (cat === "verify") {
        content = `
        <div class="section-title">Server Verification</div>

        <p>Please copy the following questions and send them in the verification channel:</p>

        <div class="card">
        How old are you?<br><br>
        How did you find this server?<br><br>
        Is this your main account?<br><br>
        Have you read the rules?<br><br>
        Have you been in a similar server before? Were you banned?<br><br>
        Do you understand staff may moderate at their own discretion?
        </div>
        `;
    }

    /* -------------------- CREDITS -------------------- */
    if (cat === "credits") {
        content = `
        <div class="section-title">Credits</div>

        <div class="card">
            Website fully developed by:<br>
            <b>@ilovetoast78</b> & <b>@ddiana.lol</b><br><br>
            Version: <b>1.1.2</b>
        </div>
        `;
    }

    document.getElementById("category-content").innerHTML = content;
    toggleSidebar();
}
</script>
</body>
  </html>
