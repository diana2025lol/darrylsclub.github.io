<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darryl's Club</title>

    <!-- Apple-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: #1f1f1f;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Header / Welcome Container */
        .header {
            text-align: center;
            padding: 80px 30px;
            max-width: 800px;
            margin: auto;
            animation: fadeIn 1.2s ease;
        }

        .header img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 25px;
            box-shadow: 0px 0px 25px rgba(255,255,255,0.07);
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .header p {
            font-size: 1.05rem;
            opacity: 0.85;
            line-height: 1.6;
        }

        /* Sidebar Button */
        .menu-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            background: #2a2a2a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.4);
        }

        .menu-btn:hover {
            background: #333;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            margin: 3px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100%;
            background: #2b2b2b;
            padding: 35px 25px;
            box-shadow: -5px 0px 15px rgba(0,0,0,0.4);
            transition: 0.45s ease;
            z-index: 999;
            overflow-y: auto;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .option {
            padding: 15px 0;
            font-size: 1.1rem;
            font-weight: 400;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        .option:hover {
            opacity: 0.6;
        }

        /* Content Sections */
        .section {
            display: none;
            max-width: 800px;
            margin: auto;
            padding: 40px 25px 90px;
            animation: fadeIn 0.7s ease;
            line-height: 1.7;
        }

        .section.active {
            display: block;
        }

        h3 {
            font-size: 1.7rem;
            margin-bottom: 20px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 22px;
            background: white;
            color: black;
            font-weight: 600;
            border-radius: 14px;
            text-decoration: none;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.7;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>

    <script>
        // Sidebar toggle
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("open");
        }

        // Load content + auto-close sidebar
        function showSection(id) {
            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            toggleMenu();
            window.scrollTo(0, 0);
        }
    </script>
</head>

<body>

    <!-- Sidebar Button -->
    <div class="menu-btn" onclick="toggleMenu()">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h2>Menu</h2>

        <div class="option" onclick="showSection('home')">Home</div>
        <div class="option" onclick="showSection('qa')">Q&A's</div>
        <div class="option" onclick="showSection('staff')">Server Staff</div>
        <div class="option" onclick="showSection('discord')">Discord Server</div>
        <div class="option" onclick="showSection('nulls')">Null's Club</div>
        <div class="option" onclick="showSection('verify')">Server Verification</div>
        <div class="option" onclick="showSection('credits')">Credits</div>
    </div>

    <!-- HOME (default) -->
    <div class="header section active" id="home">
        <img src="https://i.postimg.cc/W4Y1jwtg/301bc99bc52c48890f5618b9b0292341.jpg" alt="Logo">

        <h1>Welcome to Darryl's Club</h1>
        <p>
            Here you will find information and links regarding the community.<br><br>
            Press the three dots in the top right corner to navigate through the site.
        </p>
    </div>

    <!-- Q&A Section -->
    <div class="section" id="qa">
        <h3>Q&A's</h3>

        <p><strong
